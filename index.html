<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材料研发项目看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 28px;
            color: #4fc3f7;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            color: #aaa;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4);
        }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .btn-danger {
            background: #ef5350;
            color: #fff;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #4fc3f7;
        }
        .stat-card.warning .number {
            color: #ffa726;
        }
        .stat-card.danger .number {
            color: #ef5350;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 10px 15px;
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            border-color: #4fc3f7;
            box-shadow: 0 10px 30px rgba(79, 195, 247, 0.2);
        }
        .project-card h3 {
            color: #4fc3f7;
            margin-bottom: 10px;
        }
        .project-card .project-id {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .project-card .description {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .project-card .meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-planning { background: #4a148c; color: #ce93d8; }
        .status-active { background: #1b5e20; color: #81c784; }
        .status-hold { background: #e65100; color: #ffb74d; }
        .status-completed { background: #0d47a1; color: #64b5f6; }
        .priority-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .priority-high { background: #b71c1c; color: #ef9a9a; }
        .priority-medium { background: #e65100; color: #ffcc80; }
        .priority-low { background: #33691e; color: #aed581; }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .card-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1e1e2e;
            border: 1px solid #444;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #4fc3f7;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            color: #4fc3f7;
            margin-bottom: 30px;
        }
        .login-box .form-group {
            text-align: left;
        }
        .login-box .btn {
            width: 100%;
            margin-top: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2>🌾 材料研发项目看板</h2>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" onclick="login()">登录</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="container" style="display: none;">
        <header>
            <h1>🌾 材料研发项目看板</h1>
            <div class="user-info">
                <span id="userName"></span>
                <button class="btn btn-secondary" onclick="logout()">退出</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总项目数</h3>
                <div class="number" id="totalProjects">0</div>
            </div>
            <div class="stat-card">
                <h3>进行中</h3>
                <div class="number" id="activeProjects">0</div>
            </div>
            <div class="stat-card warning">
                <h3>待处理</h3>
                <div class="number" id="planningProjects">0</div>
            </div>
            <div class="stat-card danger">
                <h3>逾期项目</h3>
                <div class="number" id="overdueProjects">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <select class="filter-select" id="filterStatus" onchange="filterProjects()">
                <option value="">全部状态</option>
                <option value="planning">规划中</option>
                <option value="active">进行中</option>
                <option value="hold">暂停</option>
                <option value="completed">已完成</option>
            </select>
            <select class="filter-select" id="filterPriority" onchange="filterProjects()">
                <option value="">全部优先级</option>
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
            </select>
            <select class="filter-select" id="filterType" onchange="filterProjects()">
                <option value="">全部类型</option>
                <option value="brand">品牌研发</option>
                <option value="self">自主研发</option>
                <option value="external">外部引进</option>
                <option value="upgrade">迭代升级</option>
            </select>
            <button class="btn btn-primary" onclick="openCreateModal()">+ 新建项目</button>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <h2 id="modalTitle">新建项目</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-group">
                    <label>项目名称 *</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label>项目类型 *</label>
                    <select id="projectType" required>
                        <option value="brand">品牌研发项目</option>
                        <option value="self">自主研发项目</option>
                        <option value="external">外部引进研发项目</option>
                        <option value="upgrade">迭代升级研发项目</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>优先级 *</label>
                    <select id="projectPriority" required>
                        <option value="high">高</option>
                        <option value="medium">中</option>
                        <option value="low">低</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>负责人 *</label>
                    <input type="text" id="projectOwner" required>
                </div>
                <div class="form-group">
                    <label>项目描述</label>
                    <textarea id="projectDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="projectStartDate">
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="projectEndDate">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vxxkxaxvwknfafehcruj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fGFPVWlgQLy2grFS50xQgw_gfr1M_t_';
        
        let currentUser = null;
        let allProjects = [];

        // Check login status
        async function checkAuth() {
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                if (response.ok) {
                    const user = await response.json();
                    currentUser = user;
                    showMainApp();
                }
            } catch (e) {
                console.log('Not logged in');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('supabase_token', data.access_token);
                    currentUser = data.user;
                    showMainApp();
                } else {
                    alert('登录失败：' + (data.error_description || data.msg || '请检查账号密码'));
                }
            } catch (e) {
                alert('登录失败：' + e.message);
            }
        }

        function logout() {
            localStorage.removeItem('supabase_token');
            currentUser = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }

        function showMainApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.email;
            loadProjects();
        }

        async function loadProjects() {
            try {
                const token = localStorage.getItem('supabase_token');
                const response = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token || SUPABASE_KEY}`
                    }
                });
                allProjects = await response.json();
                updateStats();
                renderProjects(allProjects);
            } catch (e) {
                console.error('Failed to load projects:', e);
            }
        }

        function updateStats() {
            document.getElementById('totalProjects').textContent = allProjects.length;
            document.getElementById('activeProjects').textContent = allProjects.filter(p => p.status === 'active').length;
            document.getElementById('planningProjects').textContent = allProjects.filter(p => p.status === 'planning').length;
            
            const today = new Date();
            const overdue = allProjects.filter(p => {
                if (!p.deadline || p.status === 'completed') return false;
                return new Date(p.deadline) < today;
            }).length;
            document.getElementById('overdueProjects').textContent = overdue;
        }

        function filterProjects() {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const type = document.getElementById('filterType').value;
            
            let filtered = allProjects;
            if (status) filtered = filtered.filter(p => p.status === status);
            if (priority) filtered = filtered.filter(p => p.priority === priority);
            if (type) filtered = filtered.filter(p => p.project_type === type);
            
            renderProjects(filtered);
        }

        function renderProjects(projects) {
            const grid = document.getElementById('projectsGrid');
            
            if (projects.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>暂无项目数据</p>
                        <p style="font-size: 14px; margin-top: 10px;">点击「新建项目」开始创建</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = projects.map(p => `
                <div class="project-card">
                    <div class="project-id">${p.project_id || ''}</div>
                    <h3>${p.name}</h3>
                    <div class="description">${p.description || '暂无描述'}</div>
                    <div class="meta">
                        <span class="status-badge status-${p.status || 'planning'}">${getStatusName(p.status)}</span>
                        <span class="priority-badge priority-${p.priority || 'medium'}">${getPriorityName(p.priority)}</span>
                    </div>
                    <div class="meta">
                        <span>负责人：${p.owner || '未分配'}</span>
                        <span>类型：${getTypeName(p.project_type)}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${p.progress || 0}%"></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="editProject('${p.id}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteProject('${p.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function getStatusName(status) {
            const names = { planning: '规划中', active: '进行中', hold: '暂停', completed: '已完成' };
            return names[status] || '规划中';
        }

        function getPriorityName(priority) {
            const names = { high: '高', medium: '中', low: '低' };
            return names[priority] || '中';
        }

        function getTypeName(type) {
            const names = { brand: '品牌研发', self: '自主研发', external: '外部引进', upgrade: '迭代升级' };
            return names[type] || '未分类';
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新建项目';
            document.getElementById('projectForm').reset();
            document.getElementById('projectId').value = '';
            document.getElementById('projectModal').classList.add('active');
        }

        function editProject(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) return;
            
            document.getElementById('modalTitle').textContent = '编辑项目';
            document.getElementById('projectId').value = id;
            document.getElementById('projectName').value = project.name || '';
            document.getElementById('projectType').value = project.project_type || 'brand';
            document.getElementById('projectPriority').value = project.priority || 'medium';
            document.getElementById('projectOwner').value = project.owner || '';
            document.getElementById('projectDescription').value = project.description || '';
            document.getElementById('projectStartDate').value = project.start_date || '';
            document.getElementById('projectEndDate').value = project.deadline || '';
            document.getElementById('projectModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('projectId').value;
            const data = {
                name: document.getElementById('projectName').value,
                project_type: document.getElementById('projectType').value,
                priority: document.getElementById('projectPriority').value,
                owner: document.getElementById('projectOwner').value,
                description: document.getElementById('projectDescription').value,
                start_date: document.getElementById('projectStartDate').value,
                deadline: document.getElementById('projectEndDate').value,
                status: 'planning',
                progress: 0,
                created_by: currentUser?.id
            };
            
            try {
                const token = localStorage.getItem('supabase_token');
                const url = id ? `${SUPABASE_URL}/rest/v1/projects?id=eq.${id}` : `${SUPABASE_URL}/rest/v1/projects`;
                const method = id ? 'PATCH' : 'POST';
                
                await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token || SUPABASE_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
                
                closeModal();
                loadProjects();
            } catch (e) {
                alert('保存失败：' + e.message);
            }
        });

        async function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？')) return;
            
            try {
                const token = localStorage.getItem('supabase_token');
                await fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token || SUPABASE_KEY}`
                    }
                });
                loadProjects();
            } catch (e) {
                alert('删除失败：' + e.message);
            }
        }

        // Init
        checkAuth();
    </script>
</body>
</html>
